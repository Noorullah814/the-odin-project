<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1 class="title">Calculator</h1>
        <p class="sub-title">A modern JavaScript calculator built with HTML, CSS and vanilla JavaScript.
        </p>
    </header>
    <main>
        <div class="calculator-container">
            <div class="display-container">
                  <span class="display">0</span>
            </div>
            <div class="btn-container">
                <button class="ac common">AC</button>
                <button class="delete common">DEL</button>
                <button class="mod operator common">%</button>
                <button class="divide operator common">/</button>
                <button class="seven digit common">7</button>
                <button class="eight digit common">8</button>
                <button class="nine digit common">9</button>
                <button class="multiply operator common">*</button>
                <button class="four digit common">4</button>
                <button class="five digit common">5</button>
                <button class="six digit common">6</button>
                <button class="minus operator common">-</button>
                <button class="one digit common">1</button>
                <button class="two digit common">2</button>
                <button class="three digit common">3</button>
                <button class="plus operator common">+</button>
                <button class="zero digit common">0</button>
                <button class="floating-point common">.</button>
                <button class="equal common">=</button>
            </div>
        </div>
    </main>
    <footer>
        <p>Built by NoOr Ullah - <strong>The Odin Project 2026</strong></p>
    </footer>
</body>

</html>
